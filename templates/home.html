<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Home Page</h1>
    <a href="/add">Add Note</a>
    <h2>Your Notes</h2>
    <table>
        <tr>
            <th>Sr No</th>
            <th>Title</th>
            <th>Content</th>
            <th>Created at</th>
        </tr>
        {% for note in notes %}
            <tr>
                <td>{{note.id}}</td>
                <td>{{note.title}}</td>
                <td>{{note.content}}</td>
                <td>{{note.created_at}}</td>
                <td><a href="{{url_for('delete',id=note.id)}}">Delete</a></td>
                <td><a href="{{url_for('edit',id=note.id)}}">Update</a></td>
            </tr>
        {% endfor %}
    </table>
</body>
</html>
